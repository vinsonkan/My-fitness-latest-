<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>100天增肌減脂防爆 IndexedDB 版 V5.4</title>
    <style>
        :root { --safe-top: env(safe-area-inset-top, 20px); --safe-bottom: env(safe-area-inset-bottom, 20px); }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; padding: calc(var(--safe-top) + 15px) 15px calc(var(--safe-bottom) + 15px) 15px; }
        .container { max-width: 600px; margin: 0 auto; background: #1e1e1e; padding: 20px; border-radius: 16px; }
        h1 { text-align: center; color: #ff9f43; font-size: 1.4em; }
        .day-counter { background: linear-gradient(45deg, #ee5253, #feca57); padding: 12px; border-radius: 12px; text-align: center; color: white; margin-bottom: 15px; }
        .tracker-section { background: #2d2d2d; padding: 12px; border-radius: 10px; margin-bottom: 15px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 10px; }
        .input-group input { flex: 1; background: #1a1a1a; border: 1px solid #444; color: white; padding: 8px; border-radius: 6px; }
        .input-group button, .file-label { background: #10ac84; color: white; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; text-align: center; cursor: pointer; }
        .photo-wall { display: flex; gap: 8px; overflow-x: auto; padding: 5px 0; }
        .photo-slot { min-width: 85px; height: 110px; background: #1a1a1a; border-radius: 6px; overflow: hidden; position: relative; border: 1px dashed #555; text-align: center; font-size: 0.75em; color: #888; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏋️‍♂️ 100天極致進化 V5.4 (第一天啟航)</h1>

    <div class="day-counter">
        <div style="font-size:1.3em; font-weight:bold;" id="dayDisplay">100天計劃：第 1 天</div>
        <div style="font-size:0.95em; margin-top:4px; opacity:0.9;" id="realDateDisplay">📅 2026年5月26日 (星期二)</div>
    </div>

    <div class="tracker-section">
        <h4>📸 晨起空腹體態相冊 (大容量不卡頓)</h4>
        <div class="input-group">
            <label class="file-label" style="width:100%; background: #3d3d3d;">
                ➕ 拍攝/上傳今日體態照片
                <input type="file" accept="image/*" id="photoInput" style="display:none;" onchange="savePhotoIndexedDB()">
            </label>
        </div>
        <div class="photo-wall" id="photoWall"></div>
    </div>

    <div class="tracker-section">
        <h4>⚖️ 每日體重登記</h4>
        <div class="input-group">
            <input type="number" step="0.1" id="weightInput" placeholder="輸入今日體重 (kg)">
            <button onclick="saveWeight()">紀錄</button>
        </div>
        <div id="weightHistory" style="font-size:0.85em; color:#aaa;">暫無紀錄</div>
    </div>
    
    <p style="text-align:center; font-size:0.8em; color:#555;">其他打勾清單與餐單功能皆正常運作...</p>
</div>

<script>
    // 鎖定 2026 年 5 月 26 日為 Day 1
    const PLAN_START_DATE = new Date("2026-05-26T00:00:00");
    let todayObj = new Date();
    todayObj.setHours(0,0,0,0);
    let tempStart = new Date(PLAN_START_DATE);
    tempStart.setHours(0,0,0,0);
    let diffTime = todayObj.getTime() - tempStart.getTime();
    let currentPlanDay = Math.floor(diffTime / (1000 * 60 * 60 * 24)) + 1;
    if (currentPlanDay < 1) currentPlanDay = 1;
    if (currentPlanDay > 100) currentPlanDay = 100;

    // 🚀 初始化大容量本地數據庫 IndexedDB
    let db;
    const request = indexedDB.open("CoachPhotoDB", 1);
    request.onupgradeneeded = function(e) {
        db = e.target.result;
        if (!db.objectStoreNames.contains("photos")) {
            db.createObjectStore("photos", { keyPath: "day" });
        }
    };
    request.onsuccess = function(e) {
        db = e.target.result;
        loadPhotoWall(); // 數據庫準備好後載入相片
    };

    function updateDashboard() {
        document.getElementById("dayDisplay").innerText = `100天計劃：第 ${currentPlanDay} 天`;
        loadWeightHistory();
    }

    // 🚀 修正版：儲存照片到 IndexedDB（完美支援 iPhone 大圖）
    function savePhotoIndexedDB() {
        const file = document.getElementById("photoInput").files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onloadend = function () {
            const transaction = db.transaction(["photos"], "readwrite");
            const store = transaction.objectStore("photos");
            
            // 寫入數據庫
            store.put({ day: currentPlanDay, image: reader.result });
            
            transaction.oncomplete = function() {
                alert("🎉 Day 1 體態相片上傳並儲存成功！");
                loadPhotoWall();
            };
        }
        reader.readAsDataURL(file);
    }

    // 🚀 讀取相片牆
    function loadPhotoWall() {
        if (!db) return;
        const transaction = db.transaction(["photos"], "readonly");
        const store = transaction.objectStore("photos");
        const request = store.getAll();

        request.onsuccess = function(e) {
            const allPhotos = e.target.result;
            // 轉成字典方便讀取
            let photoMap = {};
            allPhotos.forEach(p => photoMap[p.day] = p.image);

            let html = "";
            let milestoneDays = [1, 30, 60, currentPlanDay];
            milestoneDays = [...new Set(milestoneDays)].sort((a,b)=>a-b);

            milestoneDays.forEach(d => {
                if (photoMap[d]) {
                    html += `<div class="photo-slot"><img src="${photoMap[d]}"><span style="position:absolute; bottom:0; background:rgba(0,0,0,0.7); width:100%; color:white; font-size:10px;">Day ${d}</span></div>`;
                } else {
                    html += `<div class="photo-slot">無 Day ${d}<br>照片</div>`;
                }
            });
            document.getElementById("photoWall").innerHTML = html;
        };
    }

    function saveWeight() {
        let val = document.getElementById("weightInput").value;
        if(!val) return;
        let history = JSON.parse(localStorage.getItem('weightHistoryLog')) || [];
        history.unshift({ day: currentPlanDay, weight: val, date: new Date().toLocaleDateString() });
        localStorage.setItem('weightHistoryLog', JSON.stringify(history));
        document.getElementById("weightInput").value = "";
        loadWeightHistory();
    }

    function loadWeightHistory() {
        let history = JSON.parse(localStorage.getItem('weightHistoryLog')) || [];
        let html = history.map(item => `<div>第 ${item.day} 天: <b>${item.weight} kg</b></div>`).join('');
        document.getElementById("weightHistory").innerHTML = html || "暫無紀錄";
    }

    window.onload = updateDashboard;
</script>
</body>
</html>
